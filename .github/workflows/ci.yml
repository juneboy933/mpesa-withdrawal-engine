name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: withdraw_engine
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      NODE_ENV: test
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      MPESA_CONSUMER_KEY: ${{ secrets.MPESA_CONSUMER_KEY }}
      MPESA_CONSUMER_SECRET: ${{ secrets.MPESA_CONSUMER_SECRET }}
      MPESA_TOKEN_URL: ${{ secrets.MPESA_TOKEN_URL }}
      MPESA_B2C_URL: ${{ secrets.MPESA_B2C_URL }}
      MPESA_INITIATOR_NAME: ${{ secrets.MPESA_INITIATOR_NAME }}
      MPESA_SECURITY_CREDENTIAL: ${{ secrets.MPESA_SECURITY_CREDENTIAL }}
      MPESA_SHORTCODE: ${{ secrets.MPESA_SHORTCODE }}
      MPESA_CALLBACK_URL: ${{ secrets.MPESA_CALLBACK_URL }}
      API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test -- --runInBand

      - name: Build app
        run: npm run build

      - name: Build Docker image
        run: docker build -t withdraw-engine:test .
